# Single-node Elasticsearch for development — not for production.
# helm repo add elastic https://helm.elastic.co
# helm install elasticsearch elastic/elasticsearch -n elk --create-namespace -f values-elasticsearch.yaml
replicas: 1
minimumMasterNodes: 1
clusterName: elasticsearch
esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    memory: "2Gi"
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 30Gi

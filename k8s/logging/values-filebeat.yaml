# helm install filebeat elastic/filebeat -n elk -f values-filebeat.yaml
# Sends Kubernetes container logs to Elasticsearch (bypasses Logstash). To use
# Logstash instead, replace the output block with output.logstash hosts.
daemonset:
  enabled: true
filebeatConfig:
  filebeat.yml: |
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"
    output.elasticsearch:
      hosts: ["http://elasticsearch-master:9200"]
      protocol: "http"
resources:
  requests:
    cpu: "100m"
    memory: "200Mi"

# Optional: receive Beats and forward to Elasticsearch (ELK "L" layer).
# helm install logstash elastic/logstash -n elk -f values-logstash.yaml
replicas: 1
logstashPipeline:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }
    filter {
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch-master:9200"]
        index => "logstash-%{+YYYY.MM.dd}"
      }
    }
persistence:
  enabled: false
resources:
  requests:
    cpu: "200m"
    memory: "1Gi"

# Dev defaults — replace before production (rotate django-secret-key and password).
apiVersion: v1
kind: Secret
metadata:
  name: sysmon-secrets
  namespace: sysmon
type: Opaque
stringData:
  username: sysmon_user
  password: sysmon_pass
  database: sysmon_db
  django-secret-key: dev-only-change-in-production-use-openssl-rand-hex-32

apiVersion: v1
kind: Service
metadata:
  name: sysmon-frontend
  namespace: sysmon
  labels:
    app: sysmon-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: sysmon-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sysmon-frontend
  namespace: sysmon
  labels:
    app: sysmon-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sysmon-frontend
  template:
    metadata:
      labels:
        app: sysmon-frontend
    spec:
      containers:
        - name: frontend
          image: sysmon-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: sysmon-frontend-nginx

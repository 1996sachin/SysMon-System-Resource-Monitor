# Optional: requires an Ingress controller (nginx, traefik, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sysmon
  namespace: sysmon
  annotations:
    # nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: sysmon.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sysmon-frontend
                port:
                  name: http
